<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보안 시스템</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+KR:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c10;
      --surface: #0d1117;
      --border: #1e2d3d;
      --accent: #00e5ff;
      --accent-dim: rgba(0,229,255,0.12);
      --accent-glow: rgba(0,229,255,0.35);
      --danger: #ff3d5a;
      --success: #00e5a0;
      --text: #c9d1d9;
      --text-dim: #4a5568;
      --mono: 'Share Tech Mono', monospace;
      --sans: 'Noto Sans KR', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* Corner scan line */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 0;
      right: 0;
      height: 200px;
      background: linear-gradient(transparent, rgba(0,229,255,0.04), transparent);
      animation: scan 6s linear infinite;
      pointer-events: none;
    }
    @keyframes scan {
      to { top: 110vh; }
    }

    .panel {
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px;
      position: relative;
      box-shadow: 0 0 60px rgba(0,229,255,0.06), inset 0 1px 0 rgba(255,255,255,0.04);
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Corner accents */
    .panel::before, .panel::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      border-color: var(--accent);
      border-style: solid;
    }
    .panel::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .panel::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      background: var(--accent-dim);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 2px;
      padding: 5px 12px;
      margin-bottom: 16px;
    }
    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; box-shadow: 0 0 6px var(--accent); }
      50%      { opacity: 0.4; box-shadow: none; }
    }

    h1 {
      font-family: var(--mono);
      font-size: 22px;
      color: #fff;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }

    .fields { display: flex; flex-direction: column; gap: 14px; margin-bottom: 28px; }

    .field {
      position: relative;
      animation: fadeUp 0.6s ease both;
    }
    .field:nth-child(1) { animation-delay: 0.08s; }
    .field:nth-child(2) { animation-delay: 0.16s; }
    .field:nth-child(3) { animation-delay: 0.24s; }

    .field label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }
    .input-wrap::before {
      content: attr(data-index);
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 14px 12px 36px;
      font-family: var(--mono);
      font-size: 14px;
      color: #fff;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    input[type="text"]::placeholder {
      color: var(--text-dim);
      letter-spacing: 0;
      font-size: 12px;
    }
    input[type="text"]:focus {
      border-color: var(--accent);
      background: var(--accent-dim);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
    }

    .btn {
      width: 100%;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 14px;
      border-radius: 3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }
    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
      z-index: 0;
    }
    .btn:hover::before { transform: scaleX(1); }
    .btn:hover { color: #080c10; box-shadow: 0 0 20px var(--accent-glow); }
    .btn span { position: relative; z-index: 1; }
    .btn:active { opacity: 0.8; }

    /* Result area */
    .result {
      margin-top: 24px;
      border-radius: 3px;
      overflow: hidden;
      display: none;
      animation: fadeUp 0.4s ease both;
    }
    .result.show { display: block; }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(0,229,160,0.1);
      border: 1px solid rgba(0,229,160,0.3);
      border-radius: 3px 3px 0 0;
      border-bottom: none;
    }
    .result-icon {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: var(--success);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .result-icon svg { width: 11px; height: 11px; }

    .result-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--success);
    }

    .result-body {
      background: rgba(0,229,160,0.05);
      border: 1px solid rgba(0,229,160,0.3);
      border-radius: 0 0 3px 3px;
      padding: 16px;
    }

    .result-label {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    #final-res {
      font-family: var(--mono);
      font-size: 20px;
      color: var(--success);
      letter-spacing: 3px;
      text-shadow: 0 0 16px rgba(0,229,160,0.5);
    }

    /* Error shake */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-6px); }
      40%      { transform: translateX(6px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }

    .error-msg {
      display: none;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--danger);
      text-align: center;
      margin-top: 12px;
      letter-spacing: 1px;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>

<div class="panel">
  <div class="header">
    <div class="badge">SECURE ACCESS</div>
    <h1>보안 시스템</h1>
    <p class="subtitle">마스터 키 3개를 순서대로 입력하세요</p>
  </div>

  <div class="fields">
    <div class="field">
      <label>Master Key 01</label>
      <div class="input-wrap" data-index="#">
        <input type="text" id="k1" placeholder="키를 입력하세요" autocomplete="off">
      </div>
    </div>
    <div class="field">
      <label>Master Key 02</label>
      <div class="input-wrap" data-index="#">
        <input type="text" id="k2" placeholder="키를 입력하세요" autocomplete="off">
      </div>
    </div>
    <div class="field">
      <label>Master Key 03</label>
      <div class="input-wrap" data-index="#">
        <input type="text" id="k3" placeholder="키를 입력하세요" autocomplete="off">
      </div>
    </div>
  </div>

  <button class="btn" onclick="checkKeys()"><span>시스템 해제</span></button>

  <p class="error-msg" id="err-msg">[ 접근 거부 ] — 키가 일치하지 않습니다</p>

  <div class="result" id="secret-area">
    <div class="result-header">
      <div class="result-icon">
        <svg viewBox="0 0 12 12" fill="none">
          <path d="M2 6l3 3 5-5" stroke="#080c10" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="result-title">인증 완료 — 시스템 해제됨</span>
    </div>
    <div class="result-body">
      <p class="result-label">최종 정답</p>
      <div id="final-res"></div>
    </div>
  </div>
</div>

<script>
  async function checkKeys() {
    const errMsg = document.getElementById('err-msg');
    const panel  = document.querySelector('.panel');

    errMsg.classList.remove('show');

    try {
      const res = await fetch('/api/verify-all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          val1: document.getElementById('k1').value,
          val2: document.getElementById('k2').value,
          val3: document.getElementById('k3').value
        })
      });

      const data = await res.json();

      if (data.success) {
        document.getElementById('secret-area').classList.add('show');
        document.getElementById('final-res').innerText = data.finalAnswer;
      } else {
        panel.classList.remove('shake');
        void panel.offsetWidth; // reflow
        panel.classList.add('shake');
        errMsg.classList.add('show');
      }
    } catch (e) {
      // Demo only: 실제 서버 연결 없이 동작 확인
      panel.classList.remove('shake');
      void panel.offsetWidth;
      panel.classList.add('shake');
      errMsg.classList.add('show');
    }
  }

  // Enter key support
  document.querySelectorAll('input').forEach((el, i, arr) => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (i < arr.length - 1) arr[i + 1].focus();
        else checkKeys();
      }
    });
  });
</script>
</body>
</html>
